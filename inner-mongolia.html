    <style>
        /* 브라우저 기본 여백 제거 및 깔끔한 배경색 설정 */
        body {
            margin: 0;
            padding: 0;
            background-color: #f4f5f7;
            text-align: center;
        }

        /* 문서를 담는 중앙 컨테이너 */
        .pdf-container {
            max-width: 800px; /* PC 모니터에서는 너무 커지지 않도록 800px로 제한 */
            margin: 0 auto;   /* 화면 한가운데 정렬 */
            padding: 20px 10px; /* 모바일에서 좌우 여백을 살짝 주기 위함 */
        }

        /* 개별 이미지(페이지) 스타일 - 모바일/PC 반응형 핵심 */
        .pdf-page {
            width: 100%; /* 컨테이너 폭에 맞춰 100% 꽉 차게 설정 */
            height: auto; /* 원본 이미지의 가로세로 비율 유지 */
            display: block;
            margin-bottom: 24px; /* 페이지와 페이지 사이의 간격 */
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15); /* 종이 문서처럼 보이게 그림자 효과 */
            border-radius: 4px; /* 모서리를 아주 살짝 둥글게 */
            background-color: #ffffff; /* 이미지가 뜨기 전 흰색 배경 */
        }
    </style>
</head>
